<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Симулация: Втори принцип на Нютон</title>

<style>
:root{
  --panel:#f4f7fb;
  --line:#cfd8e3;
  --text:#1f2937;
  --accent:#2563eb;
  --ok:#0f766e;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI",Arial,sans-serif;
  background:#0b1220;
  padding:16px;
  color:var(--text);
}
.app{
  max-width:1100px;
  margin:auto;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 12px 28px rgba(0,0,0,.25);
}
.head{
  padding:16px;
  border-bottom:1px solid var(--line);
  background:#f8fafc;
}
.head h1{margin:0;font-size:22px}

.layout{
  display:grid;
  grid-template-columns:340px 1fr;
  min-height:600px;
}
.left{
  background:var(--panel);
  border-right:1px solid var(--line);
  padding:14px;
}
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
.card h3{margin:0 0 10px;font-size:16px}

.row{margin-bottom:14px}
label{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-bottom:6px;
}
.val{font-weight:700;color:var(--accent)}
input[type=range]{width:100%}

.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button{
  padding:10px;
  border-radius:10px;
  border:1px solid #c7d2e1;
  background:#fff;
  cursor:pointer;
  font-weight:600;
}
button.primary{
  background:var(--accent);
  color:#fff;
}

.formula{
  font-family:Consolas,monospace;
  background:#f8fafc;
  border:1px dashed #c9d6e8;
  border-radius:10px;
  padding:8px;
  font-size:14px;
  line-height:1.6;
}

.right{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.scene{
  position:relative;
  height:380px;
  border:1px solid var(--line);
  border-radius:12px;
  overflow:hidden;
  background:linear-gradient(#eef6ff,#ffffff 40%);
}
.ground{
  position:absolute;
  left:0;right:0;bottom:85px;
  height:12px;
  background:#8b95a7;
}

.block{
  position:absolute;
  width:90px;
  height:58px;
  left:70px;
  bottom:97px;
  background:#f59e0b;
  border:3px solid #374151;
  border-radius:8px;
  display:grid;
  place-items:center;
  font-weight:700;
  padding-top:6px;
}

.arrow{
  position:absolute;
  height:4px;
  background:#2563eb;
  transform-origin:left center;
  border-radius:3px;
}
.arrow::after{
  content:"";
  position:absolute;
  right:-10px;
  top:-4px;
  border-left:10px solid #2563eb;
  border-top:6px solid transparent;
  border-bottom:6px solid transparent;
}

.status{
  font-weight:700;
  padding:10px;
  border-radius:10px;
  background:#f8fafc;
  border:1px solid #e2e8f0;
}

@media(max-width:940px){
  .layout{grid-template-columns:1fr}
  .left{border-right:0;border-bottom:1px solid var(--line)}
}
.back-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin:16px;
}
.sim{
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,.12);
  background:rgba(124,92,255,.95);
  color:#fff;
  cursor:pointer;
  font-weight:800;
  text-decoration:none;
  transition:transform .08s ease, background .15s ease;
}
.sim:hover{ transform: translateY(-1px); }
.sim:active{ transform: translateY(0px); }
</style>
</head>

<body>
   <a href="handbook.html" class="sim back-btn">⬅Върни се обратно</a>
<div class="app">
<div class="head">
<h1>Симулация: Втори принцип на Нютон (F = m·a)</h1>
</div>

<div class="layout">
<div class="left">

<div class="card">
<h3>Параметри</h3>

<div class="row">
<label>Маса m (kg) <span class="val" id="mVal">5.0</span></label>
<input id="m" type="range" min="1" max="20" step="0.5" value="5">
</div>

<div class="row">
<label>Сила F (N) <span class="val" id="FVal">20</span></label>
<input id="F" type="range" min="0" max="200" step="1" value="20">
</div>

<div class="btns">
<button class="primary" id="playBtn">Пусни / Пауза</button>
<button id="resetBtn">Нулирай</button>
</div>
</div>

<div class="card">
<h3>Сметки</h3>
<div class="formula" id="calcBox"></div>
</div>

</div>

<div class="right">

<div class="scene" id="scene">
<div class="ground"></div>
<div class="block" id="block">m</div>
<div class="arrow" id="arrF"></div>
</div>

<div class="status" id="status">Статус: Готово.</div>

</div>
</div>
</div>

<script>
const mInput=document.getElementById("m");
const FInput=document.getElementById("F");
const mVal=document.getElementById("mVal");
const FVal=document.getElementById("FVal");
const calcBox=document.getElementById("calcBox");
const statusBox=document.getElementById("status");
const block=document.getElementById("block");
const scene=document.getElementById("scene");
const arrF=document.getElementById("arrF");

const playBtn=document.getElementById("playBtn");
const resetBtn=document.getElementById("resetBtn");

let x=70;
let v=0;
let running=true;
let lastTime=null;

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

function updateUI(){
  const m=parseFloat(mInput.value);
  const F=parseFloat(FInput.value);

  mVal.textContent=m.toFixed(1);
  FVal.textContent=F.toFixed(0);

  const a=F/m;

  calcBox.innerHTML=
    `F = m·a<br>`+
    `a = F/m = ${F.toFixed(1)} / ${m.toFixed(1)} = <b>${a.toFixed(2)} m/s²</b>`;

  statusBox.innerHTML=
    `Тялото се ускорява с <b>a = ${a.toFixed(2)} m/s²</b>`;
  statusBox.style.color="var(--ok)";

  const baseX=x+45;
  const y=scene.clientHeight-170;
  const len=clamp(F*1.2,10,220);

  arrF.style.left=baseX+"px";
  arrF.style.top=y+"px";
  arrF.style.width=len+"px";

  return {m,F,a};
}

function animate(ts){
  if(!lastTime) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.04);
  lastTime=ts;

  const state=updateUI();

  if(running){
    v+=state.a*dt;
    x+=v*dt*50;
  }

  const minX=20;
  const maxX=scene.clientWidth-110;
  if(x<minX){x=minX;v=0;}
  if(x>maxX){x=maxX;v=0;}

  block.style.left=x+"px";
  block.textContent=`m=${state.m.toFixed(1)}kg`;

  requestAnimationFrame(animate);
}

[mInput,FInput].forEach(inp=>inp.addEventListener("input",updateUI));

playBtn.addEventListener("click",()=>running=!running);

resetBtn.addEventListener("click",()=>{
  x=70;v=0;running=true;
  mInput.value=5;
  FInput.value=20;
  updateUI();
});

updateUI();
requestAnimationFrame(animate);
</script>
</body>
</html>
