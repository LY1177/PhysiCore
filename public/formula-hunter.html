<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\(', '\)'], ['$', '$']],
        displayMath: [['\[', '\]']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ловец на знания</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="games.css">
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div class="game-page">
      <div class="formula-topbar">
        <h2 id="topbarTitle">Избери клас и тема, после натисни „Зареди игра“.</h2>
        <p id="messageText">Чрез движение със стрелки ↑ ↓ ← → достигни до зеления кръг. Условието на задачата се показва в бялото поле, а не в горния бар.</p>
      </div>
    <aside class="game-sidebar">
      <a href="igra.html" class="sim back-btn">⬅Върни се обратно</a>
      <br>
      <br>
      <h1>Ловец на знания</h1>

      <label>Клас</label>
      <select id="classLevel">
        <option value="8">8 клас</option>
        <option value="9">9 клас</option>
        <option value="10">10 клас</option>
      </select>

      <label>Теми</label>
      <select id="topics" multiple size="6" aria-label="Теми"></select>
      <p id="topicsStatus" class="topics-status">Зареждане на темите…</p>

      <button id="loadBtn">Зареди игра</button>

      <div class="game-stats">
        <p>Точки: <span id="score">0</span></p>
        <p>Събрани клетки: <span id="collected">0</span></p>
      </div>

     
    </aside>

    <main class="game-main">
      <div id="gameBoard" class="grid-board">
        <div id="player" class="player1">💡</div>
      </div>
    </main>
  </div>

  <div id="questionModal" class="modal hidden">
    <div class="modal-card">
      <h2>Физична задача</h2>
      <div id="modalQuestionText" class="modal-question"></div>
      <div id="optionsBox" class="options-box"></div>
      <p id="resultText"></p>
      <button id="closeModalBtn" class="hidden">Продължи</button>
    </div>
  </div>

  <script src="/game-db.js"></script>
  <script src="/formula-hunter.js"></script>
</body>
</html>
