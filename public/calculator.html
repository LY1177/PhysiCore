<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Калкулатор</title>

  <style>
    :root {
      --bg0: #070a12;
      --bg1: #0b1020;
      --card: rgba(255, 255, 255, 0.06);
      --stroke: rgba(255, 255, 255, 0.1);
      --text: #eaf1ff;
      --muted: rgba(234, 241, 255, 0.6);
      --accent: #997ae1;
      --shadow: 0 20px 60px rgba(80, 38, 164, 0.6);
      --rad: 18px;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: system-ui, Segoe UI, Roboto, Arial;
      background: var(--bg1);
      overflow-x: hidden;
    }
    body:before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.12;
      pointer-events: none;
      mask-image: radial-gradient(650px 450px at 50% 30%, #000 55%, transparent 78%);
    }

    .wrap {
      max-width: 900px;
      margin: auto;
      padding: 50px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }
    h1 { text-align: center; font-size: 34px; margin: 0; }
    .sub { text-align: center; color: var(--muted); font-size: 14px; }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.04));
      border: 1px solid var(--stroke);
      border-radius: var(--rad);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      min-width: 0;
    }

    .tabs {
      display: flex;
      gap: 10px;
      padding: 18px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .tab {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      user-select: none;
    }
    .tab.active {
      background: var(--accent);
      border-color: rgba(30, 144, 255, 0.5);
      color: #ffffff;
    }

    .formula {
      margin: 0 18px 16px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      color: var(--accent);
      min-width: 0;
    }

    .content { padding: 0 18px 18px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      min-width: 0;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    label { font-size: 12px; color: var(--muted); }

    .inputWrap { position: relative; min-width: 0; }
    input {
      width: 100%;
      padding: 14px 50px 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgb(44, 49, 87);
      color: #fff;
      font-size: 14px;
      min-width: 0;
    }
    .unit {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--muted);
      pointer-events: none; /* важно */
    }

    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      min-width: 0;
    }
    .primary {
      background: var(--accent);
      border-color: rgba(30, 144, 255, 0.6);
    }

    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      background: rgb(44, 49, 87);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .result b { color: var(--muted); font-size: 12px; }
    .value { font-size: 20px; font-weight: 900; }
    .err { color: #ff6b81; }

    @media (max-width: 480px) {
      .wrap { padding: 28px 14px; }
      h1 { font-size: 28px; }
      .tabs { padding: 14px; }
      .tab { flex: 1 1 auto; }
      .formula { font-size: 18px; padding: 14px; margin: 0 14px 14px; }
      .content { padding: 0 14px 14px; }
      .actions { flex-direction: column; }
      button { flex: none; width: 100%; }
      .result { flex-direction: column; align-items: flex-start; }
      .value { font-size: 18px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>📝 Калкулатор</h1>
    <div class="sub">Избери формула и въведи стойности</div>

    <div class="card" id="app">
      <div class="tabs" id="tabs"></div>
      <div class="formula" id="formula"></div>

      <div class="content">
        <div class="grid" id="fields"></div>

        <div class="actions">
          <button class="primary" id="btnCalc" type="button">Изчисли →</button>
          <button id="btnReset" type="button">Нулирай</button>
        </div>

        <div class="result">
          <div>
            <b>Резултат</b><br />
            <span id="meta" style="font-size: 12px; color: var(--muted)">—</span>
          </div>
          <div class="value" id="result">—</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // НОВ калкулатор: без inline JS, без "vals", чете директно input-ите
    document.addEventListener("DOMContentLoaded", () => {
      const formulas = [
        {
          id: "speed",
          name: "Скорост",
          formulaText: "v = s / t",
          out: { key: "v", unit: "m/s" },
          inputs: [
            { key: "s", label: "Разстояние", unit: "m" },
            { key: "t", label: "Време", unit: "s" },
          ],
          calc: ({ s, t }) => (t === 0 ? null : s / t),
        },
        {
          id: "force",
          name: "Сила",
          formulaText: "F = m · a",
          out: { key: "F", unit: "N" },
          inputs: [
            { key: "m", label: "Маса", unit: "kg" },
            { key: "a", label: "Ускорение", unit: "m/s²" },
          ],
          calc: ({ m, a }) => m * a,
        },
        {
          id: "ke",
          name: "Кинетична енергия",
          formulaText: "Eₖ = ½ m v²",
          out: { key: "Eₖ", unit: "J" },
          inputs: [
            { key: "m", label: "Маса", unit: "kg" },
            { key: "v", label: "Скорост", unit: "m/s" },
          ],
          calc: ({ m, v }) => 0.5 * m * v * v,
        },
        {
          id: "pe",
          name: "Потенциална енергия",
          formulaText: "Eₚ = m g h",
          out: { key: "Eₚ", unit: "J" },
          inputs: [
            { key: "m", label: "Маса", unit: "kg" },
            { key: "g", label: "g", unit: "m/s²" },
            { key: "h", label: "Височина", unit: "m" },
          ],
          calc: ({ m, g, h }) => m * g * h,
        },
        {
          id: "ohm",
          name: "Закон на Ом",
          formulaText: "V = I R",
          out: { key: "V", unit: "V" },
          inputs: [
            { key: "I", label: "Ток", unit: "A" },
            { key: "R", label: "Съпротивление", unit: "Ω" },
          ],
          calc: ({ I, R }) => I * R,
        },
        {
          id: "rho",
          name: "Плътност",
          formulaText: "ρ = m / V",
          out: { key: "ρ", unit: "kg/m³" },
          inputs: [
            { key: "m", label: "Маса", unit: "kg" },
            { key: "V", label: "Обем", unit: "m³" },
          ],
          calc: ({ m, V }) => (V === 0 ? null : m / V),
        },
        {
          id: "acceleration",
          name: "Ускорение",
          formulaText: "a = Δv / Δt",
          out: { key: "a", unit: "m/s²" },
          inputs: [
            { key: "dv", label: "Промяна на скоростта", unit: "m/s" },
            { key: "dt", label: "Промяна на времето", unit: "s" },
          ],
          calc: ({ dv, dt }) => (dt === 0 ? null : dv / dt),
        },
        {
          id: "weight",
          name: "Тежест",
          formulaText: "G = m g",
          out: { key: "G", unit: "N" },
          inputs: [
            { key: "m", label: "Маса", unit: "kg" },
            { key: "g", label: "Земно ускорение", unit: "m/s²" },
          ],
          calc: ({ m, g }) => m * g,
        },
        {
          id: "work",
          name: "Работа",
          formulaText: "A = F s",
          out: { key: "A", unit: "J" },
          inputs: [
            { key: "F", label: "Сила", unit: "N" },
            { key: "s", label: "Път", unit: "m" },
          ],
          calc: ({ F, s }) => F * s,
        },
        {
          id: "power",
          name: "Мощност",
          formulaText: "P = A / t",
          out: { key: "P", unit: "W" },
          inputs: [
            { key: "A", label: "Работа", unit: "J" },
            { key: "t", label: "Време", unit: "s" },
          ],
          calc: ({ A, t }) => (t === 0 ? null : A / t),
        },
        {
          id: "pressure",
          name: "Налягане",
          formulaText: "p = F / S",
          out: { key: "p", unit: "Pa" },
          inputs: [
            { key: "F", label: "Сила", unit: "N" },
            { key: "S", label: "Площ", unit: "m²" },
          ],
          calc: ({ F, S }) => (S === 0 ? null : F / S),
        },
        {
          id: "hydro",
          name: "Хидростатично налягане",
          formulaText: "p = ρ g h",
          out: { key: "p", unit: "Pa" },
          inputs: [
            { key: "rho", label: "Плътност", unit: "kg/m³" },
            { key: "g", label: "Земно ускорение", unit: "m/s²" },
            { key: "h", label: "Дълбочина", unit: "m" },
          ],
          calc: ({ rho, g, h }) => rho * g * h,
        },
        {
          id: "current",
          name: "Електричен ток",
          formulaText: "I = q / t",
          out: { key: "I", unit: "A" },
          inputs: [
            { key: "q", label: "Заряд", unit: "C" },
            { key: "t", label: "Време", unit: "s" },
          ],
          calc: ({ q, t }) => (t === 0 ? null : q / t),
        },
        {
          id: "resistance",
          name: "Съпротивление",
          formulaText: "R = U / I",
          out: { key: "R", unit: "Ω" },
          inputs: [
            { key: "U", label: "Напрежение", unit: "V" },
            { key: "I", label: "Ток", unit: "A" },
          ],
          calc: ({ U, I }) => (I === 0 ? null : U / I),
        },
        {
          id: "electric-power",
          name: "Ел. мощност",
          formulaText: "P = U I",
          out: { key: "P", unit: "W" },
          inputs: [
            { key: "U", label: "Напрежение", unit: "V" },
            { key: "I", label: "Ток", unit: "A" },
          ],
          calc: ({ U, I }) => U * I,
        },
        {
          id: "electric-work",
          name: "Ел. работа",
          formulaText: "A = U I t",
          out: { key: "A", unit: "J" },
          inputs: [
            { key: "U", label: "Напрежение", unit: "V" },
            { key: "I", label: "Ток", unit: "A" },
            { key: "t", label: "Време", unit: "s" },
          ],
          calc: ({ U, I, t }) => U * I * t,
        },
        {
          id: "terminal-voltage",
          name: "Клемно напрежение",
          formulaText: "U = ε - I r",
          out: { key: "U", unit: "V" },
          inputs: [
            { key: "e", label: "ЕДН", unit: "V" },
            { key: "I", label: "Ток", unit: "A" },
            { key: "r", label: "Вътрешно съпротивление", unit: "Ω" },
          ],
          calc: ({ e, I, r }) => e - I * r,
        },
        {
          id: "electrostatic-force",
          name: "Сила в ел. поле",
          formulaText: "F = q E",
          out: { key: "F", unit: "N" },
          inputs: [
            { key: "q", label: "Заряд", unit: "C" },
            { key: "E", label: "Напрегнатост", unit: "N/C" },
          ],
          calc: ({ q, E }) => q * E,
        },
        {
          id: "ampere-force",
          name: "Сила на Ампер",
          formulaText: "F = B I l",
          out: { key: "F", unit: "N" },
          inputs: [
            { key: "B", label: "Магнитна индукция", unit: "T" },
            { key: "I", label: "Ток", unit: "A" },
            { key: "l", label: "Дължина", unit: "m" },
          ],
          calc: ({ B, I, l }) => B * I * l,
        },
        {
          id: "lorentz-force",
          name: "Лоренцова сила",
          formulaText: "F = q v B",
          out: { key: "F", unit: "N" },
          inputs: [
            { key: "q", label: "Заряд", unit: "C" },
            { key: "v", label: "Скорост", unit: "m/s" },
            { key: "B", label: "Магнитна индукция", unit: "T" },
          ],
          calc: ({ q, v, B }) => q * v * B,
        },
        {
          id: "induction",
          name: "Индуцирано напрежение",
          formulaText: "ε = ΔΦ / Δt",
          out: { key: "ε", unit: "V" },
          inputs: [
            { key: "dphi", label: "Промяна на магнитния поток", unit: "Wb" },
            { key: "dt", label: "Време", unit: "s" },
          ],
          calc: ({ dphi, dt }) => (dt === 0 ? null : dphi / dt),
        },
        {
          id: "refractive-index",
          name: "Показател на пречупване",
          formulaText: "n = c / v",
          out: { key: "n", unit: "" },
          inputs: [
            { key: "c", label: "Скорост на светлината", unit: "m/s" },
            { key: "v", label: "Скорост в средата", unit: "m/s" },
          ],
          calc: ({ c, v }) => (v === 0 ? null : c / v),
        },
        {
          id: "wave-length",
          name: "Вълнова дължина",
          formulaText: "λ = v / f",
          out: { key: "λ", unit: "m" },
          inputs: [
            { key: "v", label: "Скорост на вълната", unit: "m/s" },
            { key: "f", label: "Честота", unit: "Hz" },
          ],
          calc: ({ v, f }) => (f === 0 ? null : v / f),
        },
        {
          id: "sound-speed",
          name: "Звук — λ = v / f",
          formulaText: "v = λ f",
          out: { key: "v", unit: "m/s" },
          inputs: [
            { key: "lambda", label: "Дължина на вълната", unit: "m" },
            { key: "f", label: "Честота", unit: "Hz" },
          ],
          calc: ({ lambda, f }) => lambda * f,
        },
        {
          id: "em-wave",
          name: "Елмаг. вълни",
          formulaText: "c = λ f",
          out: { key: "c", unit: "m/s" },
          inputs: [
            { key: "lambda", label: "Дължина на вълната", unit: "m" },
            { key: "f", label: "Честота", unit: "Hz" },
          ],
          calc: ({ lambda, f }) => lambda * f,
        },
        {
          id: "photon-energy",
          name: "Енергия на фотон",
          formulaText: "E = h f",
          out: { key: "E", unit: "J" },
          inputs: [
            { key: "h", label: "Константа на Планк", unit: "J·s" },
            { key: "f", label: "Честота", unit: "Hz" },
          ],
          calc: ({ h, f }) => h * f,
        },
        {
          id: "oscillation-period",
          name: "Период",
          formulaText: "T = 1 / f",
          out: { key: "T", unit: "s" },
          inputs: [
            { key: "f", label: "Честота", unit: "Hz" },
          ],
          calc: ({ f }) => (f === 0 ? null : 1 / f),
        },
        {
          id: "radioactive-decay",
          name: "Радиоактивен разпад",
          formulaText: "N = N₀ / 2ⁿ",
          out: { key: "N", unit: "ядра" },
          inputs: [
            { key: "N0", label: "Начален брой ядра", unit: "" },
            { key: "n", label: "Брой полуживоти", unit: "" },
          ],
          calc: ({ N0, n }) => N0 / Math.pow(2, n),
        },
      ];

      const elTabs = document.getElementById("tabs");
      const elFormula = document.getElementById("formula");
      const elFields = document.getElementById("fields");
      const elRes = document.getElementById("result");
      const elMeta = document.getElementById("meta");
      const btnCalc = document.getElementById("btnCalc");
      const btnReset = document.getElementById("btnReset");

      let current = formulas[0];

      function toNumber(str) {
        const s = (str ?? "").toString().trim().replace(",", ".");
        if (s === "") return { ok: false, msg: "Празно поле" };
        const n = Number(s);
        if (!Number.isFinite(n)) return { ok: false, msg: "Невалидно число" };
        return { ok: true, value: n };
      }

      function setResult(text, meta, isError = false) {
        if (isError) {
          elRes.innerHTML = `<span class="err">${text}</span>`;
        } else {
          elRes.textContent = text;
        }
        elMeta.textContent = meta ?? "—";
      }

      function render() {
        // tabs
        elTabs.innerHTML = "";
        for (const f of formulas) {
          const t = document.createElement("div");
          t.className = "tab" + (f === current ? " active" : "");
          t.textContent = f.name;
          t.addEventListener("click", () => {
            current = f;
            render();
          });
          elTabs.appendChild(t);
        }

        // formula text
        elFormula.textContent = current.formulaText;

        // fields
        elFields.innerHTML = "";
        for (const inp of current.inputs) {
          const field = document.createElement("div");
          field.className = "field";
          field.innerHTML = `
            <label>${inp.label}</label>
            <div class="inputWrap">
              <input id="in_${inp.key}" inputmode="decimal" placeholder="Въведи число">
              <div class="unit">${inp.unit}</div>
            </div>
          `;
          elFields.appendChild(field);
        }

        // Enter = calc
        elFields.querySelectorAll("input").forEach((input) => {
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") doCalc();
          });
        });

        setResult("—", "—");
      }

      function readInputs() {
        const data = {};
        for (const inp of current.inputs) {
          const el = document.getElementById("in_" + inp.key);
          const parsed = toNumber(el.value);
          if (!parsed.ok) {
            return { ok: false, msg: `${inp.label}: ${parsed.msg}` };
          }
          data[inp.key] = parsed.value;
        }
        return { ok: true, data };
      }

      function doCalc() {
        const read = readInputs();
        if (!read.ok) {
          setResult("Грешка", read.msg, true);
          return;
        }

        const r = current.calc(read.data);

        if (r === null || !Number.isFinite(r)) {
          setResult("Грешка", "Невалидни данни (деление на 0?)", true);
          return;
        }

        const out = (Math.abs(r) > 1000 ? r.toFixed(3) : r.toFixed(6)) + " " + current.out.unit;
        setResult(out, current.out.key);
      }

      function doReset() {
        render(); // презарежда полетата чисти
      }

      btnCalc.addEventListener("click", doCalc);
      btnReset.addEventListener("click", doReset);

      render();
    });
  </script>
</body>
</html>
