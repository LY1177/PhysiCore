<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhysiCore • Куиз режим</title>
  <link rel="stylesheet" href="style.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\(', '\)']],
        displayMath: [['\[', '\]']]
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    .quiz-shell{max-width:900px;margin:0 auto;padding:22px}
    .quiz-stage{min-height:420px}
    .quiz-title{font-size:clamp(28px,4vw,42px);margin:0 0 10px;font-weight:900}
    .quiz-sub{color:var(--muted);font-size:16px;line-height:1.6;max-width:60ch}
    .quiz-board{padding:18px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.05));border:1px solid var(--stroke);box-shadow:var(--shadow)}
    .quiz-progress{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
    .quiz-counter{font-size:14px;color:var(--muted);font-weight:700}
    .quiz-question{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.25;margin:8px 0 12px}
    .quiz-topic{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--stroke);color:var(--muted);margin-bottom:16px}
    .quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
    .quiz-option{position:relative;border:none;border-radius:22px;padding:18px 18px 18px 72px;min-height:92px;text-align:left;font-size:18px;font-weight:800;cursor:pointer;color:#fff;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);transition:transform .12s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease}
    .quiz-option:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.24);border-color:rgba(255,255,255,.26)}
    .quiz-option.is-selected{outline:3px solid rgba(255,255,255,.22);background:rgba(255,255,255,.12)}
    .quiz-letter{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:14px;display:grid;place-items:center;font-size:20px;font-weight:900;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2)}
    .quiz-controls{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap}
    .quiz-note{color:var(--muted);font-size:14px}
    .quiz-result-ring{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;margin:0 auto 18px;background:conic-gradient(#8B5CF6 calc(var(--pct)*1%), rgba(255,255,255,.08) 0)}
    .quiz-result-ring::before{content:"";width:114px;height:114px;border-radius:50%;background:var(--panel);display:block}
    .quiz-result-value{position:relative;margin-top:-104px;text-align:center;font-size:32px;font-weight:900}
    .quiz-review{margin-top:18px;display:grid;gap:14px}
    .quiz-review .task-card{padding:16px}
    .quiz-review ul{list-style:none;margin:0;padding:0;display:grid;gap:8px}
    .quiz-review li{padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05)}
    .quiz-review li.correct{background:rgba(46,229,157,.14);border-color:rgba(46,229,157,.4)}
    .quiz-review li.wrong{background:rgba(255,92,122,.14);border-color:rgba(255,92,122,.4)}
    .quiz-review li.missed{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.16)}
    @media (max-width:700px){.quiz-options{grid-template-columns:1fr}.quiz-option{min-height:84px;font-size:17px}}
  </style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<header class="topbar">
  <div class="brand">
    <div><img src="pictures/logo.png" style="height:50px;width:45px;"></div>
    <div>
      <div class="brand-title">PhysiCore</div>
      <div class="brand-sub">Куиз режим</div>
    </div>
  </div>
  <nav class="nav">
    <a class="navlink" href="/test">← Назад към тестовете</a>
    <a class="navlink" href="#" id="btnLogout">Изход</a>
  </nav>
</header>
<main class="quiz-shell">
  <section class="panel">
    <h1 class="quiz-title">🎯 Куиз режим</h1>
    <p class="quiz-sub">Въпросите се взимат от базата данни и се показват един по един в стил на Kahoot, но без таймер. След като продължиш напред, не можеш да се върнеш назад.</p>
    <div class="row" style="margin-top:16px;">
      <div class="field" style="min-width:220px;">
        <label>Клас</label>
        <select class="input" id="quizClass">
          <option value="8">8 клас</option>
          <option value="9">9 клас</option>
          <option value="10">10 клас</option>
        </select>
      </div>
      <div class="field" style="min-width:220px;">
        <label>Брой въпроси</label>
        <select class="input" id="quizCount">
          <option value="8">8</option>
          <option value="10">10</option>
          <option value="12">12</option>
          <option value="15">15</option>
          <option value="20">20</option>
        </select>
      </div>
      <div class="field" style="min-width:220px;">
        <label>&nbsp;</label>
        <button class="btn primary" id="btnStartQuiz" style="width:100%;">Започни куиз</button>
      </div>
    </div>
    <div class="hint" id="quizHint" style="margin-top:10px;"></div>
    <div class="divider"></div>
    <div id="quizArea" class="quiz-stage">
      <div class="empty">Натисни „Започни куиз“, за да започнеш.</div>
    </div>
  </section>
</main>
<script src="role-ui.js"></script>
<script src="quiz.js"></script>
<script src="app.js"></script>
</body>
</html>
