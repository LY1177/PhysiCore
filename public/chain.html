<!doctype html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chain</title>
  <style>
    :root{
      --bg0:#0b1020;
      --bg1:#121a34;
      --card: rgba(255,255,255,.07);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --hot:#e94560;
      --ok:#4ecca3;
      --blue:#3ea0ff;
      --shadow: 0 18px 55px rgba(0,0,0,.55);
      --r: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:#0b1020;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px 14px;
    }
    .app{
      width:min(1020px, 100%);
      display:grid;
      grid-template-columns: 1fr 360px;
      gap: 14px;
      align-items:start;
    }
    header{
      grid-column:1/-1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 14px 16px;
      border:1px solid var(--stroke);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .brand{
      display:flex; gap:12px; align-items:center;
      min-width:0;
    }
    .logo{
      width:44px;height:44px;border-radius: 14px;
      background:
        radial-gradient(circle at 30% 30%, rgba(78,204,163,.95), rgba(78,204,163,.18));
      border:1px solid rgba(78,204,163,.35);
      box-shadow: 0 16px 42px rgba(78,204,163,.18);
      position:relative;
      flex:0 0 auto;
    }
    .logo:after{
      content:"";
      position:absolute; inset:10px;
      border-radius: 12px;
      background: rgba(255,255,255,.18);
      transform: rotate(12deg);
    }
    h1{
      margin:0;
      font-size: 1.02rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .sub{
      margin-top:2px;
      font-size:.92rem;
      color:var(--muted);
    }
    .pillrow{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .pill{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.07);
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 999px;
      font-weight:800;
      font-size:.9rem;
      display:flex; align-items:center; gap:8px;
      user-select:none;
    }
    .btn{
      border:1px solid var(--stroke);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:900;
      transition: transform .12s ease, background .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); background: rgba(255,255,255,.11); }
    .btn:active{ transform: translateY(0px); }
    .btn.primary{background:#22c55e; color: black; }
    .btn.danger{border-color: rgba(78,204,163,.35); background: rgba(78,204,163,.14); }

    .card{
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow:hidden;
    }
    .card .head{
      padding: 12px 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .card .head strong{ font-size: 1rem; }
    .card .body{ padding: 12px 14px; }

    #gameWrap{ position:relative; }
    canvas{
      width:100%;
      height:auto;
      display:block;
      border-radius: 14px;
      background: rgba(10,18,42,.55);
      border:1px solid rgba(255,255,255,.10);
      cursor:pointer;
    }
    .overlay{
      position:absolute;
      inset: 10px;
      pointer-events:none;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 8px;
      color: rgba(255,255,255,.92);
      font-weight:900;
      text-shadow: 0 6px 18px rgba(0,0,0,.55);
    }
    .tag{
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.10);
      font-size:.9rem;
    }

    .grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat{
      background: rgba(0,0,0,.14);
      border:1px solid rgba(255,255,255,.10);
      border-radius: 14px;
      padding: 10px 10px;
      min-height: 72px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .stat .k{ color: var(--muted); font-weight:800; font-size:.86rem; }
    .stat .v{ font-size:1.08rem; font-weight:950; }
    .status{
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      font-weight:950;
      line-height: 1.35rem;
    }
    .status.ok{ border-color: rgba(78,204,163,.35); background: rgba(78,204,163,.10); color: rgba(210,255,240,.95); }
    .status.bad{ border-color: rgba(233,69,96,.35); background: rgba(233,69,96,.10); color: rgba(255,220,226,.95); }

    .hint{
      color: var(--muted);
      font-size: .92rem;
      line-height: 1.35rem;
    }
    .sep{ height:10px; }
    .small{ font-size:.86rem; color: var(--muted); }

    @media (max-width: 980px){
      .app{ grid-template-columns: 1fr; }
    }
    html,body{overflow-x:hidden;max-width:100%}

@media (max-width: 900px){
  .tabs{flex-wrap:wrap}
  .tab{max-width:100%}
}

@media (max-width: 600px){
  .tabs{flex-wrap:wrap}
  .tab{flex:1 1 auto;min-width:0}
}

  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div style="min-width:0">
          <h1>Електрическа верига</h1>
          <div class="sub">Завъртай компоненти и свържи 🔋батерията с 💡лампата</div>
        </div>
      </div>
      <div class="pillrow">
        <div class="pill"> Ниво: <span id="lvlTxt">4×4</span></div>
        <div class="pill" style="display: none;"> <span id="sndTxt" style="display: none;">Sound ON</span></div>
      </div>
    </header>

    <section class="card" id="gameWrap">
      <div class="head">
        <strong>Игрално поле</strong>
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end">
          <button class="btn" id="btnHint"> Подсказка</button>
          <button class="btn" id="btnShuffle"> Разбъркай</button>
          <button class="btn primary" id="btnNew"> Ново ниво</button>
        </div>
      </div>
      <div class="body">
        <div style="position:relative">
          <canvas id="gameCanvas" width="560" height="560"></canvas>
          <div class="overlay">
          </div>
        </div>
        <div class="sep"></div>
        
      </div>
    </section>

    <aside class="card">
      <div class="head">
        <strong>Панел</strong>
        <button class="btn" id="btnSound" style="display: none;">🔊</button>
      </div>
      <div class="body">
        <div class="grid2">
          <div class="stat"><div class="k">⏱️ Време</div><div class="v" id="timeTxt">00:00</div></div>
          <div class="stat"><div class="k">🧠 Ходове</div><div class="v" id="movesTxt">0</div></div>
          <div class="stat"><div class="k">⚡ Захранени</div><div class="v"><span id="poweredTxt">0</span>/<span id="totalTxt">0</span></div></div>
          <div class="stat"><div class="k">🏆 Рекорд</div><div class="v" id="bestTxt">—</div></div>
        </div>

        <div class="sep"></div>
        <div class="status bad" id="statusBox">ВЕРИГАТА Е ПРЕКЪСНАТА</div>

        <div class="sep"></div>
        <div class="small">Нива:</div>
        <div class="sep" style="height:6px"></div>
        <div style="display:flex; gap:10px; flex-wrap:wrap">
          <button class="btn" data-size="4">4×4</button>
          <button class="btn" data-size="5">5×5</button>
          <button class="btn" data-size="6">6×6</button>
        </div>

        <div class="sep"></div>
        <button class="btn danger" id="btnReset" style="width:100%">↩️ Рестарт</button>
      </div>
    </aside>
  </div>

<script>
(() => {
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  let gridSize = 4;
  let cellSize = canvas.width / gridSize;
  let board = [];
  let moves = 0;
  let startTime = 0;
  let timerHandle = null;
  let soundOn = false;
  let solved = false;

  const STORAGE_BEST = "voltscape_best_v1";

  const TYPE_WEIGHTS = [
    {t:1, w:38},
    {t:2, w:34},
    {t:3, w:18},
    {t:4, w:10},
  ];

  const DR = [-1,0,1,0];
  const DC = [0,1,0,-1];

  function randWeightedType(){
    const sum = TYPE_WEIGHTS.reduce((a,b)=>a+b.w,0);
    let r = Math.random() * sum;
    for(const it of TYPE_WEIGHTS){
      r -= it.w;
      if(r <= 0) return it.t;
    }
    return 1;
  }

  function pad2(n){ return String(n).padStart(2, "0"); }

  function playClick(){}

  function openings(type, rot){
    let base;
    if(type===1) base = [1,1,0,0];
    else if(type===2) base = [0,1,0,1];
    else if(type===3) base = [1,1,0,1];
    else base = [1,1,1,1];

    const out = [0,0,0,0];
    for(let d=0; d<4; d++){
      out[(d+rot)%4] = base[d];
    }
    return out.map(Boolean);
  }

  function initBoard(){
    board = [];
    for(let r=0; r<gridSize; r++){
      board[r] = [];
      for(let c=0; c<gridSize; c++){
        board[r][c] = {
          type: randWeightedType(),
          rotation: Math.floor(Math.random()*4),
          powered: false,
          inPath: false
        };
      }
    }

    board[0][0].type = 2;
    board[gridSize-1][gridSize-1].type = 2;

    carveGuaranteedPath();
    scrambleRotations(10 + gridSize*gridSize);
    moves = 0;
    solved = false;
    resetTimer();
    updateHUD();
    render();
  }

  function carveGuaranteedPath(){
    const path = [{r:0,c:0}];
    let r=0,c=0;
    const visited = new Set(["0,0"]);
    while(!(r===gridSize-1 && c===gridSize-1)){
      const options = [];
      for(let d=0; d<4; d++){
        const nr = r + DR[d], nc = c + DC[d];
        if(nr<0||nc<0||nr>=gridSize||nc>=gridSize) continue;
        const dist = Math.abs((gridSize-1)-nr)+Math.abs((gridSize-1)-nc);
        options.push({nr,nc,d,score: dist + (visited.has(nr+","+nc)? 2.2:0)});
      }
      options.sort((a,b)=>a.score-b.score);
      const pickPool = options.slice(0, Math.min(3, options.length));
      const pick = pickPool[Math.floor(Math.random()*pickPool.length)];
      r = pick.nr; c = pick.nc;
      path.push({r,c});
      visited.add(r+","+c);
      if(path.length > gridSize*gridSize*3) break;
    }

    for(let i=0; i<path.length; i++){
      const cur = path[i];
      const prev = path[i-1];
      const next = path[i+1];
      const need = [false,false,false,false];

      if(prev){
        const d = dirBetween(cur, prev);
        need[d] = true;
      }
      if(next){
        const d = dirBetween(cur, next);
        need[d] = true;
      }

      const count = need.filter(Boolean).length;

      let type = 2;
      if(count <= 1) type = 2;
      else if(count === 2){
        const sides = need.map((v,idx)=>v?idx:-1).filter(v=>v>=0);
        const opp = ( (sides[0]+2)%4 === sides[1] );
        type = opp ? 2 : 1;
      } else if(count === 3) type = 3;
      else type = 4;

      board[cur.r][cur.c].type = type;

      const rot = findRotationForNeed(type, need);
      board[cur.r][cur.c].rotation = rot;
    }
  }

  function dirBetween(a,b){
    const dr = b.r - a.r;
    const dc = b.c - a.c;
    for(let d=0; d<4; d++){
      if(DR[d]===dr && DC[d]===dc) return d;
    }
    return 0;
  }

  function findRotationForNeed(type, need){
    for(let rot=0; rot<4; rot++){
      const op = openings(type, rot);
      let ok = true;
      for(let d=0; d<4; d++){
        if(need[d] && !op[d]) { ok=false; break; }
      }
      if(ok) return rot;
    }
    return 0;
  }

  function scrambleRotations(k){
    for(let i=0; i<k; i++){
      const r = Math.floor(Math.random()*gridSize);
      const c = Math.floor(Math.random()*gridSize);
      if((r===0&&c===0) || (r===gridSize-1&&c===gridSize-1)) continue;
      board[r][c].rotation = Math.floor(Math.random()*4);
    }
  }

  function computePower(){
    for(let r=0;r<gridSize;r++){
      for(let c=0;c<gridSize;c++){
        board[r][c].powered = false;
        board[r][c].inPath = false;
      }
    }

    const q = [];
    const prev = Array.from({length:gridSize}, ()=>Array.from({length:gridSize}, ()=>null));

    q.push({r:0,c:0});
    board[0][0].powered = true;

    while(q.length){
      const {r,c} = q.shift();
      const tile = board[r][c];
      const op = openings(tile.type, tile.rotation);

      for(let d=0; d<4; d++){
        if(!op[d]) continue;
        const nr = r + DR[d], nc = c + DC[d];
        if(nr<0||nc<0||nr>=gridSize||nc>=gridSize) continue;

        const nt = board[nr][nc];
        const nop = openings(nt.type, nt.rotation);
        const back = (d+2)%4;
        if(!nop[back]) continue;

        if(!board[nr][nc].powered){
          board[nr][nc].powered = true;
          prev[nr][nc] = {r,c};
          q.push({r:nr,c:nc});
        }
      }
    }

    const goalPowered = board[gridSize-1][gridSize-1].powered;

    if(goalPowered){
      let cr = gridSize-1, cc = gridSize-1;
      while(!(cr===0 && cc===0)){
        board[cr][cc].inPath = true;
        const p = prev[cr][cc];
        if(!p) break;
        cr = p.r; cc = p.c;
      }
      board[0][0].inPath = true;
    }

    return goalPowered;
  }

  function render(){
    cellSize = canvas.width / gridSize;

    const win = computePower();
    const poweredCount = countPowered();

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const vg = ctx.createRadialGradient(
      canvas.width*0.5, canvas.height*0.45, canvas.width*0.12,
      canvas.width*0.5, canvas.height*0.5, canvas.width*0.62
    );
    vg.addColorStop(0,"rgba(255,255,255,0.06)");
    vg.addColorStop(1,"rgba(0,0,0,0.35)");
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let r=0;r<gridSize;r++){
      for(let c=0;c<gridSize;c++){
        drawTile(r,c,board[r][c]);
      }
    }

    document.getElementById("poweredTxt").textContent = poweredCount;
    document.getElementById("totalTxt").textContent = gridSize*gridSize;

    setStatus(win);

    if(win && !solved){
      solved = true;
      clearInterval(timerHandle);
      saveBest();
    }
  }

  function drawTile(r,c,tile){
    const x = c*cellSize, y = r*cellSize;
    const center = cellSize/2;

    ctx.save();
    ctx.translate(x,y);

    ctx.fillStyle = "rgba(255,255,255,0.05)";
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    roundRect(ctx, 6, 6, cellSize-12, cellSize-12, 14);
    ctx.fill();
    ctx.stroke();

    if(tile.powered){
      ctx.globalAlpha = 0.20;
      ctx.fillStyle = tile.inPath ? "rgba(78,204,163,0.35)" : "rgba(62,160,255,0.22)";
      roundRect(ctx, 4, 4, cellSize-8, cellSize-8, 16);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    ctx.save();
    ctx.translate(x + center, y + center);
    ctx.rotate(tile.rotation * Math.PI/2);

    const powered = tile.powered;
    const path = tile.inPath;

    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = Math.max(8, cellSize*0.10);

    if(powered){
      ctx.shadowBlur = path ? 22 : 16;
      ctx.shadowColor = path ? "#4ecca3" : "#3ea0ff";
    } else {
      ctx.shadowBlur = 0;
    }

    ctx.strokeStyle = powered ? (path ? "#4ecca3" : "#3ea0ff") : "rgba(170,170,170,0.35)";

    ctx.beginPath();
    const L = cellSize*0.35;
    if(tile.type === 1){
      ctx.moveTo(0, -L);
      ctx.lineTo(0, 0);
      ctx.lineTo(L, 0);
    } else if(tile.type === 2){
      ctx.moveTo(-L, 0);
      ctx.lineTo(L, 0);
    } else if(tile.type === 3){
      ctx.moveTo(0, -L);
      ctx.lineTo(0, 0);
      ctx.moveTo(-L, 0);
      ctx.lineTo(L, 0);
    } else {
      ctx.moveTo(-L, 0);
      ctx.lineTo(L, 0);
      ctx.moveTo(0, -L);
      ctx.lineTo(0, L);
    }
    ctx.stroke();

    const op = openings(tile.type, tile.rotation);
    ctx.shadowBlur = 0;
    for(let d=0; d<4; d++){
      if(!op[d]) continue;
      const tx = [0, L, 0, -L][d];
      const ty = [-L,0,L,0][d];
      ctx.fillStyle = powered ? (path ? "rgba(210,255,240,.95)" : "rgba(220,240,255,.95)") : "rgba(255,255,255,.35)";
      ctx.beginPath();
      ctx.arc(tx, ty, Math.max(4, cellSize*0.04), 0, Math.PI*2);
      ctx.fill();
    }

    ctx.restore();

    if(r===0 && c===0) drawCornerLabel(x,y,"🔋");
    if(r===gridSize-1 && c===gridSize-1) drawCornerLabel(x,y, tile.powered ? "💡⚡" : "💡");
  }

  function drawCornerLabel(x,y,txt){
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.92)";
    ctx.font = "900 16px ui-sans-serif, system-ui";
    ctx.textBaseline = "top";
    ctx.fillText(txt, x+10, y+10);
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r){
    if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(x,y,w,h,r);
      ctx.closePath();
      return;
    }
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }

  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const c = Math.floor(mx / (rect.width / gridSize));
    const r = Math.floor(my / (rect.height / gridSize));

    if(r<0||c<0||r>=gridSize||c>=gridSize) return;

    board[r][c].rotation = (board[r][c].rotation + 1) % 4;
    moves++;
    playClick(540, 0.03);
    updateHUD();
    render();
  });

  function setStatus(win){
    const box = document.getElementById("statusBox");
    if(win){
      box.className = "status ok";
      box.textContent = "ВЕРИГАТА Е ЗАТВОРЕНА! ⚡";
    } else {
      box.className = "status bad";
      box.textContent = "ВЕРИГАТА Е ПРЕКЪСНАТА";
    }
  }

  function updateHUD(){
    document.getElementById("movesTxt").textContent = moves;
    document.getElementById("lvlTxt").textContent = `${gridSize}×${gridSize}`;
    document.getElementById("sndTxt").textContent = soundOn ? "Sound ON" : "Sound OFF";
    document.getElementById("bestTxt").textContent = bestText();
  }

  function resetTimer(){
    startTime = Date.now();
    if(timerHandle) clearInterval(timerHandle);
    timerHandle = setInterval(() => {
      const s = Math.floor((Date.now() - startTime)/1000);
      document.getElementById("timeTxt").textContent = `${pad2(Math.floor(s/60))}:${pad2(s%60)}`;
    }, 200);
  }

  function bestText(){
    const best = getBest();
    if(!best) return "—";
    return `${best.size}×${best.size} • ${best.moves} ход • ${best.time}`;
  }

  function getBest(){
    try{
      const raw = localStorage.getItem(STORAGE_BEST);
      if(!raw) return null;
      const obj = JSON.parse(raw);
      return obj[String(gridSize)] || null;
    }catch(e){ return null; }
  }

  function saveBest(){
    const curTime = document.getElementById("timeTxt").textContent;
    const best = getBest();
    const cur = { size:gridSize, moves, time:curTime };

    let better = false;
    if(!best) better = true;
    else if(moves < best.moves) better = true;
    else if(moves === best.moves && curTime < best.time) better = true;

    if(better){
      try{
        const raw = localStorage.getItem(STORAGE_BEST);
        const obj = raw ? JSON.parse(raw) : {};
        obj[String(gridSize)] = cur;
        localStorage.setItem(STORAGE_BEST, JSON.stringify(obj));
      }catch(e){}
      updateHUD();
    }
  }

  function countPowered(){
    let n=0;
    for(let r=0;r<gridSize;r++) for(let c=0;c<gridSize;c++) if(board[r][c].powered) n++;
    return n;
  }

  function hint(){
    computePower();

    for(let r=0;r<gridSize;r++){
      for(let c=0;c<gridSize;c++){
        if(!board[r][c].powered) continue;

        const op = openings(board[r][c].type, board[r][c].rotation);
        for(let d=0; d<4; d++){
          if(!op[d]) continue;
          const nr = r+DR[d], nc=c+DC[d];
          if(nr<0||nc<0||nr>=gridSize||nc>=gridSize) continue;
          if(board[nr][nc].powered) continue;

          const back = (d+2)%4;
          for(let rot=0; rot<4; rot++){
            const nop = openings(board[nr][nc].type, rot);
            if(nop[back]){
              let curRot = board[nr][nc].rotation;
              if(curRot !== rot){
                board[nr][nc].rotation = (curRot + 1) % 4;
                moves++;
                playClick(620, 0.05);
              }
              updateHUD();
              render();
              return;
            }
          }
        }
      }
    }

    const rr = Math.floor(Math.random()*gridSize);
    const cc = Math.floor(Math.random()*gridSize);
    board[rr][cc].rotation = (board[rr][cc].rotation + 1) % 4;
    moves++;
    playClick(400, 0.05);
    updateHUD();
    render();
  }

  document.getElementById("btnReset").addEventListener("click", () => {
    playClick(380, 0.06);
    initBoard();
  });

  document.getElementById("btnNew").addEventListener("click", () => {
    playClick(760, 0.06);
    initBoard();
  });

  document.getElementById("btnShuffle").addEventListener("click", () => {
    playClick(520, 0.06);
    scrambleRotations(10 + gridSize*gridSize);
    moves += 2;
    solved = false;
    updateHUD();
    render();
  });

  document.getElementById("btnHint").addEventListener("click", hint);

  document.getElementById("btnSound").addEventListener("click", () => {
    soundOn = !soundOn;
    updateHUD();
    playClick(soundOn ? 700 : 300, 0.06);
  });

  document.querySelectorAll("button[data-size]").forEach(btn => {
    btn.addEventListener("click", () => {
      const s = parseInt(btn.getAttribute("data-size"),10);
      if(!Number.isFinite(s)) return;
      gridSize = s;
      canvas.width = 560;
      canvas.height = 560;
      cellSize = canvas.width / gridSize;
      playClick(680, 0.06);
      initBoard();
    });
  });

  initBoard();

})();
</script>
</body>
</html>
